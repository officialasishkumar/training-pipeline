# Full pipeline config — exercise every stage on the bundled samples.
# Run with: tp run --config configs/example.yaml

name: openagrinet-prototype

ingest:
  input: examples/sample_logs/
  output: build/canonical.jsonl
  source: null  # auto-detect per record
  quarantine: build/quarantine.jsonl

pii:
  input: build/canonical.jsonl
  output: build/redacted.jsonl
  rules_file: null  # use built-ins
  audit_output: build/audit_sample.jsonl
  audit_rate: 0.10
  audit_seed: 0
  audit_cap: 100
  # Defense-in-depth: rows that still match a PII rule after redaction are
  # routed here instead of shipping. Set fail_on_leak: true to abort the run.
  quarantine: build/redaction_quarantine.jsonl
  fail_on_leak: false

# Synthetic generation layer (off by default — see docs/GENERATION.md).
# Flip `enabled: true` in any of the three blocks below to opt in. When
# enabled, the pipeline becomes:
#   ingest -> redact -> seeds -> generate -> tag -> validate -> stratify -> export
seeds:
  enabled: false
  input: build/redacted.jsonl
  output: build/seeds.jsonl
  # 'hash' is the dependency-free fallback; 'sentence-transformers' uses
  # all-MiniLM-L6-v2 for higher-quality clustering (install [generate] extra).
  embedder: hash
  embedder_model: sentence-transformers/all-MiniLM-L6-v2
  cluster_method: greedy             # or 'kmeans' (requires scikit-learn)
  n_clusters: null
  similarity_threshold: 0.72
  seed: 0

generate:
  enabled: false
  seeds_input: build/seeds.jsonl
  output: build/synthetic.jsonl
  # Backends: 'stub' (default, deterministic, no GPU); 'transformers' or
  # 'vllm' for real models.
  backend: stub
  model_id: Qwen/Qwen2.5-7B-Instruct
  tool_registry: configs/tools.yaml
  fixtures_dir: null
  max_steps: 5
  drop_on_invalid_args: true
  system_prompt: "You are an OpenAgriNet assistant for Indian farmers."
  # Inject deliberate failures so we generate recovery trajectories.
  # Probabilities are deterministic per (seed, tool, args, call_index).
  failure_config: {}
    # mandi_price:
    #   NO_RESULTS: 0.10
    #   RATE_LIMITED: 0.05
  seed: 0

tag:
  input: build/redacted.jsonl
  output: build/tagged.jsonl

validate:
  input: build/tagged.jsonl
  tool_registry: configs/tools.yaml
  drop_on_error: false
  output: build/validated.jsonl
  issues_output: build/validation_issues.jsonl

split:
  input: build/tagged.jsonl
  output_dir: build/splits
  fractions: [0.7, 0.15, 0.15]
  seed: 42
  keys: [complexity_band, domain]
  near_duplicate_threshold: 0.85

# Diversity sampler over (difficulty x edge-case) buckets.
# Use this *before* `split` when generating from synthetic data so easy
# single-tool trajectories don't dominate the dataset.
stratify:
  enabled: false
  input: build/synthetic.jsonl
  output: build/stratified.jsonl
  cap_per_bucket: null               # e.g. 200 to cap each bucket at 200

sft:
  input: build/tagged.jsonl
  output_dir: build/sft
  # template: one of chatml, llama3, qwen, gemma, mistral, plain
  template: chatml
  system_prompt: "You are an OpenAgriNet assistant for Indian farmers."
  shard_size: 1000
  compress: false
  # loss_policy: 'assistant_only' (default) trains on assistant turns
  # including tool calls; 'assistant_text_only' skips the tool envelopes;
  # 'none' suppresses the metadata field entirely (backward-compat).
  loss_policy: assistant_only

dpo:
  input: build/tagged.jsonl
  output_dir: build/dpo
  strategy: feedback
  system_prompt: "You are an OpenAgriNet assistant for Indian farmers."
  shard_size: 1000
  compress: false
