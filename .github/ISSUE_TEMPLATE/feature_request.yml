name: Feature request
description: Propose a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        How should this work? Sketch the API, CLI, or config surface.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What did you rule out and why?

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I've checked this isn't already supported via config or extension points.
        - label: I'm willing to send a PR (or I'm just proposing — both are fine).
